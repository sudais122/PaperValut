<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Paper Upload Form</title>
    <style>
        :root {
            --navy: #0B1F3A;
            --navy-mid: #132D52;
            --navy-light: #1A3A6B;
            --gold: #E6A817;
            --gold-light: #F5C84A;
            --cream: #FDF8F0;
            --white: #FFFFFF;
            --text-light: #8FA0B4;
            --text-muted: #5A6A7E;
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--white);
        }

        .upload-form {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: var(--gold);
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(230, 168, 23, 0.3);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--white);
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="file"],
        input[type="number"],
        select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(230, 168, 23, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        input::placeholder,
        select option {
            color: var(--white);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        select option {
            background: var(--navy-mid);
            color: var(--white);
        }

        input[type="file"] {
            padding: 12px;
        }

        .optional {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--navy);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(230, 168, 23, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Success Popup */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 31, 58, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .popup-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .popup {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .popup-overlay.show .popup {
            transform: scale(1);
        }

        .popup-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            color: var(--navy);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .popup h2 {
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .popup p {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .close-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            .upload-form {
                padding: 30px 20px;
                margin: 10px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .popup {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <form class="upload-form" id="uploadForm">
        <h1>Upload Paper</h1>
        
        <div class="form-group">
            <label for="examType">Exam Type *</label>
            <select id="examType" name="examType" required>
                <option value="">Select Exam Type</option>
                <option value="mid">Mid Term</option>
                <option value="final">Final</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="year">Year of Paper *</label>
            <input type="number" id="year" name="year" placeholder="e.g., 2026" min="2023" max="2030" required>
        </div>
        
        <div class="form-group">
            <label for="department">Department *</label>
            <input type="text" id="department" name="department" placeholder="e.g., Computer Science" required>
        </div>
        
        <div class="form-group">
            <label for="courseName">Course Name *</label>
            <input type="text" id="courseName" name="courseName" placeholder="e.g., Web Development" required>
        </div>
        
        <div class="form-group">
            <label for="teacherName">Teacher Name *</label>
            <input type="text" id="teacherName" name="teacherName" placeholder="e.g., Dr. Ahmed Khan" required>
        </div>
        
        <div class="form-group">
            <label for="courseCode">Course Code (Optional)</label>
            <input type="text" id="courseCode" name="courseCode" placeholder="e.g., CS-401">
        </div>
        
        <div class="form-group">
            <label for="paperFile">Upload Paper *</label>
            <input type="file" id="paperFile" name="paperFile" accept=".pdf,.doc,.docx" required>
        </div>
        
        <button type="submit">Upload Paper</button>
    </form>

    <!-- Success Popup -->
    <div class="popup-overlay" id="successPopup">
        <div class="popup">
            <div class="popup-icon">✓</div>
            <h2>Paper Submitted!</h2>
            <p>Your paper is under review. After review, your paper will be live on the website within 1 hour.</p>
            <button class="close-btn" onclick="closePopup()">OK</button>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const successPopup = document.getElementById('successPopup');

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate all required fields are filled
            const formData = new FormData(uploadForm);
            const requiredFields = ['examType', 'year', 'department', 'courseName', 'teacherName', 'paperFile'];
            let isValid = true;
            
            requiredFields.forEach(field => {
                if (!formData.get(field)) {
                    isValid = false;
                    alert(`${field.replace(/([A-Z])/g, ' $1').replace(/year/i, 'Year').toUpperCase()} is required!`);
                    return;
                }
            });
            
            if (!isValid) return;
            
            // Show success popup
            successPopup.classList.add('show');
            document.body.style.overflow = 'hidden'; // Prevent background scroll
        });

        function closePopup() {
            successPopup.classList.remove('show');
            document.body.style.overflow = 'auto';
            uploadForm.reset(); // Reset form
        }

        // Close popup on overlay click
        successPopup.addEventListener('click', function(e) {
            if (e.target === successPopup) {
                closePopup();
            }
        });
    </script>
</body>
</html>
