<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Paper Upload Form</title>
    <link rel="stylesheet" href="upload.css">
</head>
<body>
    <form class="upload-form" id="uploadForm">
        <h1>Upload Paper</h1>
        
        <div class="form-group">
            <label for="examType">Exam Type *</label>
            <select id="examType" name="examType" required>
                <option value="">Select Exam Type</option>
                <option value="mid">Mid Term</option>
                <option value="final">Final</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="year">Year of Paper *</label>
            <input type="number" id="year" name="year" placeholder="e.g., 2026" min="2023" max="2030" required>
        </div>
        
        <div class="form-group">
            <label for="department">Department *</label>
            <input type="text" id="department" name="department" placeholder="e.g., Computer Science" required>
        </div>
        
        <div class="form-group">
            <label for="courseName">Course Name *</label>
            <input type="text" id="courseName" name="courseName" placeholder="e.g., Web Development" required>
        </div>
        
        <div class="form-group">
            <label for="teacherName">Teacher Name *</label>
            <input type="text" id="teacherName" name="teacherName" placeholder="e.g., Dr. Ahmed Khan" required>
        </div>
        
        <div class="form-group">
            <label for="courseCode">Course Code (Optional)</label>
            <input type="text" id="courseCode" name="courseCode" placeholder="e.g., CS-401">
        </div>
        
        <div class="form-group">
            <label for="paperFile">Upload Paper *</label>
            <input type="file" id="paperFile" name="paperFile" accept=".pdf,.doc,.docx" required>
        </div>
        
        <button type="submit">Upload Paper</button>
    </form>

    <!-- Success Popup -->
    <div class="popup-overlay" id="successPopup">
        <div class="popup">
            <div class="popup-icon">✓</div>
            <h2>Paper Submitted!</h2>
            <p>Your paper is under review. After review, your paper will be live on the website within 1 hour.</p>
            <button class="close-btn" onclick="closePopup()">OK</button>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const successPopup = document.getElementById('successPopup');

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate all required fields are filled
            const formData = new FormData(uploadForm);
            const requiredFields = ['examType', 'year', 'department', 'courseName', 'teacherName', 'paperFile'];
            let isValid = true;
            
            requiredFields.forEach(field => {
                if (!formData.get(field)) {
                    isValid = false;
                    alert(`${field.replace(/([A-Z])/g, ' $1').replace(/year/i, 'Year').toUpperCase()} is required!`);
                    return;
                }
            });
            
            if (!isValid) return;
            
            // Show success popup
            successPopup.classList.add('show');
            document.body.style.overflow = 'hidden'; // Prevent background scroll
        });

        function closePopup() {
            successPopup.classList.remove('show');
            document.body.style.overflow = 'auto';
            uploadForm.reset(); // Reset form
        }

        // Close popup on overlay click
        successPopup.addEventListener('click', function(e) {
            if (e.target === successPopup) {
                closePopup();
            }
        });
    </script>
</body>
</html>
